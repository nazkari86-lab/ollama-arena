<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ollama Arena ⚔️</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #161b22 0%, #1f2937 100%); padding: 24px 32px; border-bottom: 1px solid #30363d; }
  .header h1 { font-size: 28px; font-weight: 700; }
  .header h1 span { color: #58a6ff; }
  .header p { color: #8b949e; margin-top: 4px; font-size: 14px; }
  .layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
  .card h2 { font-size: 16px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; font-size: 12px; font-weight: 600; color: #8b949e; text-transform: uppercase; border-bottom: 1px solid #30363d; }
  td { padding: 12px 12px; font-size: 14px; border-bottom: 1px solid #21262d; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1f2937; }
  .rank-1 { color: #ffd700; font-weight: 700; }
  .rank-2 { color: #c0c0c0; font-weight: 700; }
  .rank-3 { color: #cd7f32; font-weight: 700; }
  .elo { font-weight: 700; color: #58a6ff; }
  .win { color: #3fb950; }
  .loss { color: #f85149; }
  .draw { color: #8b949e; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #1a3a2e; color: #3fb950; }
  .badge-blue  { background: #1c2e4a; color: #58a6ff; }
  .badge-red   { background: #3d1a1a; color: #f85149; }
  .badge-yellow{ background: #3d3000; color: #e3b341; }

  /* Match form */
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
  select, input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
  select:focus, input:focus { outline: none; border-color: #58a6ff; }
  .btn { width: 100%; padding: 10px; background: #238636; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: #2ea043; }
  .btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
  .btn-blue { background: #1f6feb; }
  .btn-blue:hover { background: #388bfd; }

  /* Log */
  .log { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 12px; font-family: 'Courier New', monospace; font-size: 12px; max-height: 200px; overflow-y: auto; margin-top: 12px; }
  .log-win  { color: #3fb950; }
  .log-loss { color: #f85149; }
  .log-draw { color: #8b949e; }

  .status { padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-top: 10px; display: none; }
  .status.running { background: #1c2e4a; color: #58a6ff; display: block; }
  .status.done    { background: #1a3a2e; color: #3fb950; display: block; }
  .status.error   { background: #3d1a1a; color: #f85149; display: block; }

  .history-item { padding: 10px 0; border-bottom: 1px solid #21262d; font-size: 13px; }
  .history-item:last-child { border-bottom: none; }
  .hist-models { font-weight: 600; margin-bottom: 4px; }
  .hist-meta { color: #8b949e; font-size: 12px; }

  .empty { text-align: center; color: #8b949e; padding: 40px; font-size: 14px; }
  .refresh { float: right; font-size: 12px; color: #58a6ff; cursor: pointer; background: none; border: none; }
  .refresh:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="header">
  <h1>⚔️ Ollama <span>Arena</span></h1>
  <p>Local LLM ELO benchmark — your models, your leaderboard</p>
</div>

<div class="layout">
  <div>
    <!-- Leaderboard -->
    <div class="card" style="margin-bottom:24px">
      <h2>🏆 ELO Leaderboard <button class="refresh" onclick="loadLeaderboard()">↻ refresh</button></h2>
      <div id="lb-table"><div class="empty">No matches yet. Run your first battle →</div></div>
    </div>

    <!-- History -->
    <div class="card">
      <h2>📜 Recent Matches <button class="refresh" onclick="loadHistory()">↻ refresh</button></h2>
      <div id="history"><div class="empty">No matches yet.</div></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div>
    <div class="card" style="margin-bottom:24px">
      <h2>⚔️ Run Battle</h2>
      <div class="form-group">
        <label>Model A</label>
        <select id="model-a"><option value="">Loading...</option></select>
      </div>
      <div class="form-group">
        <label>Model B</label>
        <select id="model-b"><option value="">Loading...</option></select>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="coding">Coding</option>
          <option value="reasoning">Reasoning</option>
          <option value="security">Security</option>
          <option value="planning">Planning</option>
          <option value="inspection">Inspection</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tasks per match</label>
        <input type="number" id="n-tasks" value="5" min="1" max="30">
      </div>
      <button class="btn" id="run-btn" onclick="runMatch()">⚔️ Start Battle</button>
      <div class="status" id="match-status"></div>
      <div class="log" id="match-log" style="display:none"></div>
    </div>

    <!-- Task stats -->
    <div class="card">
      <h2>📋 Benchmarks</h2>
      <div id="task-stats"><div class="empty">Loading...</div></div>
    </div>
  </div>
</div>

<script>
const api = async (path, opts) => {
  const r = await fetch(path, opts);
  return r.json();
};

async function loadModels() {
  const models = await api('/api/models');
  const opts = models.map(m => `<option value="${m}">${m}</option>`).join('');
  document.getElementById('model-a').innerHTML = opts || '<option>No models found</option>';
  document.getElementById('model-b').innerHTML = opts || '<option>No models found</option>';
  if (models.length >= 2) document.getElementById('model-b').selectedIndex = 1;
}

async function loadLeaderboard() {
  const board = await api('/api/leaderboard');
  if (!board.length) { document.getElementById('lb-table').innerHTML = '<div class="empty">No matches yet.</div>'; return; }
  const medals = {1:'🥇',2:'🥈',3:'🥉'};
  const rows = board.map(e => `
    <tr>
      <td class="${e.rank<=3?`rank-${e.rank}`:''}">${medals[e.rank]||e.rank}</td>
      <td><strong>${e.model}</strong></td>
      <td class="elo">${e.elo}</td>
      <td class="win">${e.wins}</td><td class="loss">${e.losses}</td><td class="draw">${e.draws}</td>
      <td>${e.matches}</td>
      <td>${(e.win_rate*100).toFixed(0)}%</td>
    </tr>`).join('');
  document.getElementById('lb-table').innerHTML = `
    <table>
      <thead><tr><th>Rank</th><th>Model</th><th>ELO</th><th>W</th><th>L</th><th>D</th><th>Matches</th><th>Win%</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function loadHistory() {
  const hist = await api('/api/history?limit=15');
  if (!hist.length) { document.getElementById('history').innerHTML = '<div class="empty">No matches yet.</div>'; return; }
  const items = hist.map(h => {
    const da = (h.elo_a_after - h.elo_a_before).toFixed(0);
    const db = (h.elo_b_after - h.elo_b_before).toFixed(0);
    const date = new Date(h.ts * 1000).toLocaleString();
    return `<div class="history-item">
      <div class="hist-models">${h.model_a} <span style="color:#8b949e">vs</span> ${h.model_b}</div>
      <div class="hist-meta">
        <span class="badge badge-blue">${h.category}</span>
        &nbsp; ELO: ${da>0?'+':''}${da} / ${db>0?'+':''}${db}
        &nbsp; <span style="float:right">${date}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('history').innerHTML = items;
}

async function loadTaskStats() {
  const data = await api('/api/categories');
  const rows = Object.entries(data.stats).map(([cat, n]) =>
    `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #21262d">
      <span>${cat}</span>
      <span class="badge badge-blue">${n} tasks</span>
    </div>`).join('');
  document.getElementById('task-stats').innerHTML = rows;
}

let pollInterval = null;

async function runMatch() {
  const ma = document.getElementById('model-a').value;
  const mb = document.getElementById('model-b').value;
  const cat = document.getElementById('category').value;
  const n = parseInt(document.getElementById('n-tasks').value) || 5;

  if (!ma || !mb || ma === mb) { alert('Select two different models'); return; }

  const btn = document.getElementById('run-btn');
  btn.disabled = true; btn.textContent = '⏳ Running...';

  const log = document.getElementById('match-log');
  const status = document.getElementById('match-status');
  log.style.display = 'block'; log.innerHTML = '';
  status.className = 'status running'; status.textContent = `⚔️ ${ma} vs ${mb} — running ${n} tasks...`;

  const {job_id} = await api('/api/match', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({model_a: ma, model_b: mb, category: cat, n}),
  });

  let lastLen = 0;
  pollInterval = setInterval(async () => {
    const job = await api(`/api/job/${encodeURIComponent(job_id)}`);
    const entries = job.log || [];
    for (let i = lastLen; i < entries.length; i++) {
      const e = entries[i];
      const icon = e.outcome === 'a_wins' ? '✅' : e.outcome === 'b_wins' ? '❌' : '🤝';
      const cls = e.outcome === 'a_wins' ? 'log-win' : e.outcome === 'b_wins' ? 'log-loss' : 'log-draw';
      log.innerHTML += `<div class="${cls}">${icon} ${e.task_id}: ${e.score_a.toFixed(2)} vs ${e.score_b.toFixed(2)}</div>`;
      log.scrollTop = log.scrollHeight;
    }
    lastLen = entries.length;

    if (job.status === 'done') {
      clearInterval(pollInterval);
      const r = job.result;
      const winner = r.a_wins > r.b_wins ? ma : r.b_wins > r.a_wins ? mb : 'Draw';
      status.className = 'status done';
      status.textContent = `✅ Done! Winner: ${winner}  ELO: ${r.elo_a_after?.toFixed(0)} / ${r.elo_b_after?.toFixed(0)}`;
      btn.disabled = false; btn.textContent = '⚔️ Start Battle';
      loadLeaderboard(); loadHistory();
    } else if (job.status === 'error') {
      clearInterval(pollInterval);
      status.className = 'status error'; status.textContent = `❌ Error: ${job.error}`;
      btn.disabled = false; btn.textContent = '⚔️ Start Battle';
    }
  }, 1500);
}

// Init
loadModels();
loadLeaderboard();
loadHistory();
loadTaskStats();
setInterval(() => { loadLeaderboard(); loadHistory(); }, 15000);
</script>
</body>
</html>
