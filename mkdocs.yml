site_name: ollama-arena
site_description: Pair-wise ELO evaluation arena for local LLMs
site_author: nazkari86-lab
repo_url: https://github.com/nazkari86-lab/ollama-arena
repo_name: nazkari86-lab/ollama-arena

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables

nav:
  - Home: index.md
  - CLI Reference: cli.md
  - Web Dashboard: web.md
  - Backends Guide: backends.md
  - Benchmarks & ELO: benchmarks.md
