[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "ollama-arena"
version = "1.0.0"
description = "⚔️ Local LLM ELO Arena — benchmark your Ollama models head-to-head"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "nazkari86-lab" }]
keywords = ["ollama", "llm", "benchmark", "elo", "arena", "evaluation", "local-ai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
requires-python = ">=3.9"
dependencies = [
    "requests>=2.28",
    "rich>=13.0",
]

[project.optional-dependencies]
web = [
    "fastapi>=0.100",
    "uvicorn[standard]>=0.22",
]
dev = [
    "pytest>=7",
    "pytest-cov",
    "ruff",
]

[project.scripts]
ollama-arena = "ollama_arena.cli:main"

[project.urls]
Homepage    = "https://github.com/nazkari86-lab/ollama-arena"
Repository  = "https://github.com/nazkari86-lab/ollama-arena"
Issues      = "https://github.com/nazkari86-lab/ollama-arena/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["ollama_arena*"]

[tool.setuptools.package-data]
"*" = ["templates/*.html"]

[tool.ruff]
line-length = 100
target-version = "py39"
