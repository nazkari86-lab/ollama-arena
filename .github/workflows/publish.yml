name: publish

on:
  release:
    types: [published]

permissions:
  id-token: write  # required for PyPI Trusted Publishing (OIDC) -- without
                    # this, gh-action-pypi-publish fails at the OIDC token
                    # exchange step on every single run (confirmed: every
                    # publish run from v2.1.2 through v3.1.0 failed here).

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
