# LLM Quality Gate — ollama-arena CI template
#
# Requirements:
#   - A self-hosted GitHub Actions runner with Ollama installed and running
#   - Set repository variables: LLM_MODEL (e.g. "llama3.2:3b")
#   - Optionally set LLM_MODEL_B for head-to-head comparison
#
# Usage:
#   Copy this file to .github/workflows/llm-benchmark.yml in your project.

name: LLM Benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      model:
        description: "Ollama model to benchmark"
        default: "llama3.2:3b"

env:
  ARENA_AUTO_APPROVE: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ollama-arena with dev extras
        run: pip install -e ".[dev,web]" --quiet

      - name: Lint
        run: ruff check ollama_arena tests

      - name: Unit tests
        run: pytest -q --tb=short

  benchmark:
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install ollama-arena
        run: pip install ollama-arena --quiet

      - name: Run benchmark (5 tasks smoke)
        run: |
          ollama-arena match \
            --models "${{ vars.LLM_MODEL || inputs.model || 'llama3.2:3b' }},${{ vars.LLM_MODEL || inputs.model || 'llama3.2:3b' }}" \
            --category coding -n 5 --share \
            >> $GITHUB_STEP_SUMMARY

      - name: Fail below threshold
        run: |
          ollama-arena benchmark ${{ vars.LLM_MODEL || inputs.model || 'llama3.2:3b' }} \
            --fail-below ${{ vars.SCORE_THRESHOLD || '60' }}

      - name: Head-to-head comparison (optional)
        if: vars.LLM_MODEL_B != ''
        run: |
          ollama-arena match \
            --models "${{ vars.LLM_MODEL }},${{ vars.LLM_MODEL_B }}" \
            --category coding -n 10 --share \
            >> $GITHUB_STEP_SUMMARY
